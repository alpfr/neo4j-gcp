steps:
  # Pull Neo4j from Docker Hub and push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-neo4j'
    args: ['pull', 'neo4j:5-community']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'tag-neo4j'
    args: ['tag', 'neo4j:5-community', 'gcr.io/$PROJECT_ID/neo4j:latest']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-neo4j'
    args: ['push', 'gcr.io/$PROJECT_ID/neo4j:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'create-cluster'
    args:
      - 'container'
      - 'clusters'
      - 'create'
      - 'neo4j-cluster'
      - '--zone=us-east4-a'
      - '--num-nodes=2'
      - '--machine-type=e2-medium'
      - '--disk-size=50GB'
    allowFailure: true

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-credentials'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'neo4j-cluster'
      - '--zone=us-east4-a'

  # Install cert-manager for TLS
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'install-cert-manager'
    args:
      - 'apply'
      - '-f'
      - 'https://github.com/cert-manager/cert-manager/releases/download/v1.14.4/cert-manager.yaml'
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'

  # Wait for cert-manager to be ready
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'wait-cert-manager'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        kubectl wait --for=condition=Available deployment/cert-manager-webhook \
          -n cert-manager --timeout=120s
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'

  # Create namespace first
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'create-namespace'
    args: ['apply', '-f', 'k8s/namespace.yaml']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'

  # Deploy all resources
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy'
    args: ['apply', '-f', 'k8s/']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'

timeout: '1800s'
