steps:
  # Pull Neo4j from Docker Hub and push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-neo4j'
    args: ['pull', 'neo4j:5-community']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'tag-neo4j'
    args: ['tag', 'neo4j:5-community', 'gcr.io/$PROJECT_ID/neo4j:latest']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-neo4j'
    args: ['push', 'gcr.io/$PROJECT_ID/neo4j:latest']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'create-cluster'
    args:
      - 'container'
      - 'clusters'
      - 'create'
      - 'neo4j-cluster'
      - '--zone=us-east4-a'
      - '--num-nodes=2'
      - '--machine-type=e2-medium'
      - '--disk-size=50GB'
    allowFailure: true

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'get-credentials'
    args:
      - 'container'
      - 'clusters'
      - 'get-credentials'
      - 'neo4j-cluster'
      - '--zone=us-east4-a'

  # Install Istio using istioctl
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'install-istio'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        curl -L https://istio.io/downloadIstio | ISTIO_VERSION=1.20.0 sh -
        ./istio-1.20.0/bin/istioctl install --set profile=default -y
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy'
    args: ['apply', '-f', 'k8s/']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=us-east4-a'
      - 'CLOUDSDK_CONTAINER_CLUSTER=neo4j-cluster'
