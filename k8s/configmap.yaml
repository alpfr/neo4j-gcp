apiVersion: v1
kind: ConfigMap
metadata:
  name: neo4j-config
  namespace: neo4j
data:
  NEO4J_dbms_memory_heap_initial__size: "512m"
  NEO4J_dbms_memory_heap_max__size: "1G"
  NEO4J_dbms_memory_pagecache_size: "512m"
  NEO4J_dbms_connector_bolt_advertised__address: "neo4j.example.com:7687"
  NEO4J_dbms_connector_http_advertised__address: "neo4j.example.com:7474"
  NEO4J_dbms_default__listen__address: "0.0.0.0"
